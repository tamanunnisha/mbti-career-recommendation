<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1f6f6f, #54a1a1, #9fc8c8);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 60%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1f6f6f;
        }

        .result {
            font-size: 50px;
            font-weight: bold;
            color: #54a1a1;
            margin: 10px 0;
        }

        .fullform {
            font-size: 18px;
            color: #1f6f6f;
            margin-bottom: 15px;
        }

        .section-title {
            color: #1f6f6f;
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .traits {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .job {
            text-align: left;
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .job b {
            color: #1f6f6f;
        }

        .skills {
            font-size: 14px;
            color: #333;
        }

        a {
            color: #1f6f6f;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(90deg, #1f6f6f, #54a1a1);
            color: white;
            border-radius: 10px;
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Your MBTI Type</h1>

    <!-- MBTI -->
    <div class="result">{{ result }}</div>

    <!-- Full form -->
    <div class="fullform">{{ full_form }}</div>

    <!-- Personality Traits -->
    <div class="section-title">Personality Traits</div>
    <div class="traits">{{ keywords }}</div>

    <!-- Jobs -->
    <div class="section-title">Tech Career Recommendations</div>

    {% for job, details in jobs.items() %}
        <div class="job">
            <b>{{ job }}</b><br>
            <span class="skills">Skills: {{ details.skills }}</span><br>
            <a href="{{ details.link }}" target="_blank">Start Learning</a>
        </div>
    {% endfor %}

    <a href="/" class="btn">Try Again</a>

</div>

</body>
</html>
